# Spring Application Configuration
spring.application.name=shieldapi

# Database Configuration (H2 - Default for Local Development)
spring.datasource.url=jdbc:h2:mem:shieldapi_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Configuration (MySQL - Alternate)
# spring.datasource.url=jdbc:mysql://localhost:3306/shieldapi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.shieldapi=INFO
logging.level.org.apache.kafka=ERROR

# Security / JWT Configuration
# Note: Use a strong, BASE64-encoded secret for production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Pagination Defaults
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

# Monitoring / Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Security - Threat Scoring
shieldapi.security.threatscore.threshold=100
shieldapi.security.threatscore.weights.auth-failure=25
shieldapi.security.threatscore.weights.rate-limit=10
shieldapi.security.threatscore.weights.suspicious-access=40

# Kafka Security Event Streaming
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
shieldapi.security.events.topic=shieldapi-security-events

# Honeypot Configuration
shieldapi.security.honeypot.paths=/admin-panel,/phpmyadmin,/.env,/.git,/wp-login,/config.php,/backup.sql
shieldapi.security.honeypot.blacklist-on-hit=true
shieldapi.security.threatscore.weights.honeypot-hit=100

# Reconnaissance Detection Configuration
shieldapi.security.recon.scan-threshold=10
# 1 minute window
shieldapi.security.recon.detection-window-seconds=60
shieldapi.security.recon.failure-threshold=5
