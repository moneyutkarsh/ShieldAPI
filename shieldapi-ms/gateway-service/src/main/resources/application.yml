server:
  port: 8080

spring:
  application:
    name: gateway-service
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: gateway-event-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  session:
    store-type: redis
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000, http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: security-service
          uri: lb://security-service
          predicates:
            - Path=/api/security/**
          filters:
            - JwtAuthenticationFilter
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**, /api/stats, /api/logs, /api/threats
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**, /ws-security/**
          filters:
            - JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

shieldapi:
  logging:
    logstash:
      destination: ${SHIELDAPI_LOGGING_LOGSTASH_DESTINATION:-localhost:5000}
  security:
    jwt:
      secret: ${JWT_SECRET:-9a4f2c8d3b7a1e0f4g6h8i2j5k9l0m1n2o3p4q5r6s7t8u9v0w1x2y3z4a5b6c7d}

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        waitDurationInOpenState: 10000
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      securityService:
        baseConfig: default
      analyticsService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Security Service
        url: /api/security/v3/api-docs
      - name: Analytics Service
        url: /api/analytics/v3/api-docs
      - name: Notification Service
        url: /api/notifications/v3/api-docs
